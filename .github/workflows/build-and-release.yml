name: Build and Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build WebUI
        run: |
          npm ci
          npm run build

      - name: Download Termux runit binaries
        id: upstream
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq patchelf
          bash dl-bins.sh

      - name: Read module version
        id: prep
        run: |
          VERSION=$(grep '^version=' magisk/module.prop | cut -d= -f2)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Package per ABI
        run: bash package.sh

      - name: Create release notes
        env:
          MODULE_VERSION: ${{ steps.prep.outputs.version }}
          RUNIT_VERSION: ${{ steps.upstream.outputs.runit_version }}
          TERMUX_PACKAGE_VERSION: ${{ steps.upstream.outputs.termux_package_version }}
        run: |
          {
            echo "## Build information"
            echo
            echo "| Component | Version |"
            echo "| --- | --- |"
            echo "| runsvdir-magisk module | $MODULE_VERSION |"
            echo "| runit upstream | $RUNIT_VERSION |"
            echo "| Termux runit package | $TERMUX_PACKAGE_VERSION |"
            echo
            echo "## ABI packages"
            echo
            echo "| Asset suffix | Android / Magisk architecture | Termux architecture |"
            echo "| --- | --- | --- |"
            echo "| arm64-v8a | arm64 | aarch64 |"
            echo "| armeabi-v7a | arm | arm |"
            echo "| x86_64 | x64 | x86_64 |"
            echo "| x86 | x86 | i686 |"
            echo
            echo "Each ZIP contains binaries for one ABI only. Download the asset matching the target device."
            echo
            echo "## SHA-256"
            echo
            echo '```text'
            cat out/SHA256SUMS
            echo '```'
          } > out/release-notes.md

          cat out/release-notes.md >> "$GITHUB_STEP_SUMMARY"

      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.prep.outputs.version }}
          name: ${{ steps.prep.outputs.version }} (runit ${{ steps.upstream.outputs.runit_version }})
          body_path: out/release-notes.md
          generate_release_notes: true
          files: |
            out/*.zip
            out/SHA256SUMS
            out/upstream-versions.env
          fail_on_unmatched_files: true
          draft: false
          prerelease: false
